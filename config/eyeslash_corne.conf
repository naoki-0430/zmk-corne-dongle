# スリープ・接続・基本設定
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
CONFIG_ZMK_SLEEP=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_POINTING=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=n
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

# ディスプレイ機能をONにする
CONFIG_ZMK_DISPLAY=y

# WPM（タイピング速度）の計算機能をONにする
#（表示自体はカスタム側が担当するので、計算だけ有効にします）
CONFIG_ZMK_WPM=y

# ドングルのバッテリー表示
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y

# --- エラー回避のための重要設定 ---
# 標準のZMKウィジェットを無効化し、カスタム表示との衝突を防ぎます
CONFIG_ZMK_WIDGET_LAYER_STATUS=n
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n
